<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Examination Submitted - UTME CBT</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="login-page-body">

    <header class="jamb-header">
        <div class="header-logo-wrap">
            <svg class="logo-svg" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                <circle cx="50" cy="50" r="48" fill="#fff" stroke="#1a5e2a" stroke-width="3"/>
                <path d="M30 35 L50 25 L70 35 L70 65 L50 75 L30 65 Z" fill="#1a5e2a" />
                <path d="M50 35 L60 55 L40 55 Z" fill="#c8a400" />
            </svg>
        </div>
        <div class="header-text">
            <h1>Joint Admissions and Matriculation Board</h1>
            <small>Submission Successful Confirmation</small>
        </div>
    </header>

    <div class="success-wrap">
        <div class="success-card">
            <div class="success-head">
                <div class="success-icon">
                    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M5 13L9 17L19 7" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </div>
                <h2>Successfully Submitted</h2>
                <p>Your examination has been received and logged onto the JAMB server.</p>
            </div>
            
            <div class="success-body text-center">
                <div class="success-notice">
                    Thank you for participating in the 2026 Unified Tertiary Matriculation Examination.
                </div>
            </div>

            <div class="success-footer text-center">
                <button class="btn-jamb px-5" onclick="finish()">RETURN TO LOGIN PAGE</button>
            </div>
        </div>
    </div>

    <script>
        // Check if actually submitted
        if(!sessionStorage.getItem('examFinished')) {
            window.location.href = 'index.html';
        }

        const regNum = sessionStorage.getItem('candidateReg') || '77488392AB';
        document.getElementById('resReg').innerText = regNum;
        document.getElementById('resTime').innerText = new Date().toLocaleString();

        function finish() {
            sessionStorage.clear();
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
