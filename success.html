<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Examination Submitted - UTME CBT</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="login-page-body">

    <header class="jamb-header">
        <div class="header-logo-wrap">
            <img src="assets/Images/jamb-logo.jfif" alt="JAMB Logo" class="jamb-logo-img" style="height: 60px; width: auto;">
        </div>
        <div class="header-text">
            <h1>Joint Admissions and Matriculation Board</h1>
            <small>Submission Successful Confirmation</small>
        </div>
    </header>

    <div class="success-wrap">
        <div class="success-card">
            <div class="success-head">
                <div class="success-icon">
                    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M5 13L9 17L19 7" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </div>
                <h2>Successfully Submitted</h2>
                <p>Your examination has been received and logged onto the JAMB server.</p>
            </div>
            
            <div class="success-body text-center">
                <div class="success-notice mb-3">
                    Thank you for participating in the 2026 Unified Tertiary Matriculation Examination.
                </div>
                <div class="text-muted" style="font-size:14px;">
                    <div id="resReg">REG: N/A</div>
                    <div id="resTime">Submitted at: N/A</div>
                </div>
            </div>

            <div class="success-footer text-center">
                <button class="btn-jamb px-5" onclick="finish()">RETURN TO LOGIN PAGE</button>
            </div>
        </div>
    </div>

    <script src="js/candidates.js"></script>
    <script>
        const regNum = sessionStorage.getItem('candidateReg');
        const finishedKey = getExamFinishedStorageKey(regNum);

        if (!regNum || !sessionStorage.getItem(finishedKey)) {
            window.location.href = 'index.html';
        }

        document.getElementById('resReg').innerText = `REG: ${regNum}`;
        document.getElementById('resTime').innerText = `Submitted at: ${new Date().toLocaleString()}`;

        function finish() {
            sessionStorage.clear();
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
